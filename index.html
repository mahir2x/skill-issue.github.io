<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahir2x | Official</title>
    <style>
        /* Modern Background & Font */
        body { 
            background: #0d0d0d; /* Deep Dark */
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* The Card - Just like Premium sites */
        .card { 
            background: rgba(255, 255, 255, 0.05); /* Glass effect */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; 
            border-radius: 24px; 
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 320px;
        }

        /* Profile Image Placeholder (Optional) */
        .profile-img {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, #00ffcc, #3399ff);
            border-radius: 50%;
            margin: 0 auto 20px;
        }

        h1 { 
            font-size: 24px;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        p { 
            color: #888; 
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* The Animated Button */
        .btn { 
            display: block;
            color: #000; 
            background: #00ffcc; /* Cyan color like Evafv */
            text-decoration: none; 
            padding: 12px; 
            border-radius: 12px; 
            font-weight: bold;
            transition: 0.4s ease;
        }

        .btn:hover { 
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 255, 204, 0.3);
            background: #fff;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-img"></div> <h1>Mahir2x</h1>
        <p>Digital Creator & Developer</p>
        
        <a href="https://www.youtube.com/channel/UCmAQ5WzTHFojI3hXp8FoaEg" class="btn">
            Subscribe on YouTube
        </a>
    </div>

</body>
</html>
